<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AssetFeed — Global asset seizure tracker</title>
<meta name="description" content="A daily-updating feed of asset seizures, forfeitures, and freezes reported by law enforcement and international institutions worldwide." />
<link rel="stylesheet" href="./style.css" />
</head>
<body>
<div class="wrap">

  <header class="site-header">
    <div class="brand">
      <div class="brand-mark" id="brand-mark"></div>
      <div>
        <p class="brand-name">AssetFeed</p>
        <p class="brand-tag">Global seizure &amp; forfeiture tracker</p>
      </div>
    </div>
    <div class="header-meta">
      <div><span class="live-dot"></span>Updated daily · <span class="updated" id="updated-time">—</span></div>
      <div><span id="source-count">—</span> sources monitored</div>
    </div>
  </header>

  <div class="stats-row" id="stats-row"></div>

  <div class="controls">
    <div class="search-box">
      <input type="text" id="search-input" placeholder="Search by asset, agency, or region…" />
    </div>
  </div>

  <div class="category-row" id="category-row"></div>

  <div class="grid" id="grid"></div>

  <div class="state-block" id="empty-state" style="display:none;">
    <h3 id="empty-title">No matches</h3>
    <p id="empty-body">Try a different search term or category.</p>
  </div>

  <footer class="site-footer">
    <span>AssetFeed</span>
    <span>Developed by Greylens Research</span>
  </footer>

</div>
<script src="./app.js"></script>
</body>
</html>
